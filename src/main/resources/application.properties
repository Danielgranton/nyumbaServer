spring.application.name=nyumba-server

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/nyumba_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:madtitan634}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT
jwt.secret=${JWT_SECRET:O3X0Z3Ph5WvqV2e6/GXPjK2dtJsVohXHjzvIMYn8F/dvWXVnX3wg/lGsbULRAg8fTq0PFRIdFZukIY2qjbtriQ==}
jwt.expiration=${JWT_EXPIRATION:86400000}

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:nyumba}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:nyumba_server}

# Queue names
media.queue.name=nyumba.media.jobs
media.callback.queue=nyumba.media.callbacks

# AWS S3
aws.region=${AWS_REGION:us-east-1}
aws.s3.bucket=${AWS_BUCKET:nyumba-media}
aws.access-key=${AWS_ACCESS_KEY:your-access-key}
aws.secret-key=${AWS_SECRET_KEY:your-secret-key}

# Media
media.upload.dir=${MEDIA_UPLOAD_DIR:uploads}
media.base.url=${MEDIA_BASE_URL:http://localhost:8080/media}
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# Pagination
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100

# Server
server.port=${PORT:8080}
